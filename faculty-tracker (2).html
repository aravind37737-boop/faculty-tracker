<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FacultyTrack — Availability Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0f26; --panel:#141630; --panel2:#1a1d3a; --border:#2a2d4a; --border2:#1e2040;
    --text:#e8e8f5; --muted:#6b7394; --faint:#4a5080;
    --green:#6EE7B7; --red:#FCA5A5; --blue:#93C5FD; --purple:#C4B5FD; --yellow:#FDE68A;
    --pink:#F9A8D4; --indigo:#A5B4FC; --mint:#86EFAC; --gray:#9CA3AF;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;height:100vh;overflow:hidden;}
  input,select,button{font-family:'DM Mono',monospace;}
  input,select{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:12px;outline:none;}
  button{cursor:pointer;}

  /* Layout */
  #app{display:flex;flex-direction:column;height:100vh;}
  header{border-bottom:1px solid var(--border2);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;flex-shrink:0;}
  .logo{font-family:'Fraunces',serif;font-size:24px;font-weight:900;letter-spacing:-0.5px;}
  .logo span{color:var(--green);}
  .date-line{font-size:10px;color:var(--faint);margin-top:1px;}
  .stat-pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;}
  .header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .btn-add{padding:8px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),var(--blue));color:#0d0f26;font-weight:700;font-size:12px;margin-left:4px;}

  .body-wrap{display:flex;flex:1;overflow:hidden;}

  /* Sidebar */
  #sidebar{width:290px;border-right:1px solid var(--border2);display:flex;flex-direction:column;flex-shrink:0;}
  .sidebar-top{padding:14px 14px 8px;flex-shrink:0;}
  .sidebar-top input{margin-bottom:8px;}
  .filters{display:flex;gap:4px;flex-wrap:wrap;}
  .filter-btn{padding:3px 9px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;text-transform:capitalize;}
  .filter-btn.active{border-color:var(--green);background:rgba(110,231,183,.13);color:var(--green);}
  #faculty-list{overflow-y:auto;flex:1;padding:4px 14px 14px;display:flex;flex-direction:column;gap:8px;}
  .empty-note{text-align:center;color:var(--faint);font-size:12px;padding:20px;}

  .fac-card{background:var(--panel);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;transition:all .15s;}
  .fac-card.selected{background:#1e2240;box-shadow:0 0 16px rgba(0,0,0,.3);}
  .fac-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .fac-card-name{font-family:'Fraunces',serif;font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fac-card-dept{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fac-card-bottom{display:flex;justify-content:space-between;align-items:center;}
  .fac-room{font-size:10px;color:var(--faint);}

  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#0d0f26;flex-shrink:0;}

  .status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
  .status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

  /* Main panel */
  #main{flex:1;overflow-y:auto;}
  .main-inner{padding:24px;}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:40px;text-align:center;}
  .empty-state .big-emoji{font-size:64px;}
  .empty-state h2{font-family:'Fraunces',serif;font-size:26px;margin:0;color:var(--text);}
  .empty-state p{font-size:13px;color:var(--muted);max-width:340px;line-height:1.7;margin:0;}
  .btn-add-first{margin-top:8px;padding:14px 32px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--green),var(--blue));color:#0d0f26;font-weight:700;font-size:14px;}

  .fac-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:22px;flex-wrap:wrap;}
  .fac-header-name{font-family:'Fraunces',serif;font-size:22px;font-weight:700;}
  .fac-header-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .fac-header-meta{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--faint);}
  .fac-header-actions{display:flex;gap:8px;flex-wrap:wrap;}

  .btn{padding:10px 20px;border-radius:9px;border:none;font-weight:600;font-size:12px;color:#0d0f26;}
  .btn.small{padding:6px 14px;font-size:11px;}
  .btn.outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .btn.danger{background:rgba(239,68,68,.13);color:#EF4444;}

  .tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--panel);border-radius:11px;padding:3px;width:fit-content;}
  .tab-btn{padding:7px 18px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-weight:400;font-size:11px;text-transform:capitalize;transition:all .15s;}
  .tab-btn.active{color:#0d0f26;font-weight:700;}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
  .stat-card .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .stat-card .value{font-family:'Fraunces',serif;font-size:30px;font-weight:900;}
  .stat-card .suffix{font-size:10px;color:var(--faint);margin-top:3px;}

  .panel-box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;}
  .panel-box h3{font-family:'Fraunces',serif;font-size:16px;margin:0 0 14px 0;color:var(--text);}
  .empty-mini{text-align:center;color:var(--faint);font-size:12px;padding:16px 0;}

  .ch-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--panel2);border-radius:9px;margin-bottom:8px;}
  .ch-day{font-weight:600;font-size:13px;width:110px;}
  .ch-time{font-size:12px;color:var(--muted);}
  .ch-hours{margin-left:auto;font-size:10px;padding:2px 9px;border-radius:9px;}

  .mt-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--panel2);border-radius:11px;margin-bottom:10px;}
  .mt-bar{width:4px;height:44px;border-radius:4px;flex-shrink:0;}
  .mt-title{font-size:13px;font-weight:600;margin-bottom:3px;}
  .mt-sub{font-size:11px;color:var(--muted);}
  .mt-type{font-size:10px;padding:3px 9px;border-radius:9px;margin-bottom:3px;text-transform:capitalize;text-align:right;}
  .mt-student{font-size:10px;color:var(--faint);text-align:right;}

  /* Weekly grid */
  .grid-scroll{overflow-x:auto;}
  .grid-inner{min-width:680px;}
  .grid-row{display:grid;grid-template-columns:68px repeat(6,1fr);gap:2px;margin-bottom:2px;}
  .grid-head{text-align:center;font-size:10px;color:var(--faint);padding:4px 0;}
  .grid-head.today{font-weight:700;}
  .grid-time{font-size:10px;color:var(--faint);padding-top:4px;text-align:right;padding-right:8px;}
  .grid-cell{height:30px;border-radius:5px;background:var(--panel2);border:1px solid #22254a;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .grid-cell .dot{width:4px;height:4px;border-radius:50%;}
  .grid-cell .mt-name{font-size:8px;color:var(--text);padding:0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);text-transform:capitalize;}
  .legend-swatch{width:10px;height:10px;border-radius:2px;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.hidden{display:none;}
  .modal{background:var(--panel);border:1.5px solid var(--border);border-radius:20px;width:520px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.5);}
  .modal.small{width:420px;padding:32px;}
  .modal.confirm{width:340px;padding:28px;text-align:center;}
  .modal-head{padding:22px 28px 16px;border-bottom:1px solid var(--border2);flex-shrink:0;}
  .modal-head-row{display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-family:'Fraunces',serif;font-size:20px;font-weight:700;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;}
  .step-tabs{display:flex;gap:4px;margin-top:14px;}
  .step-tab{flex:1;padding:7px 4px;border-radius:8px;border:none;background:transparent;color:var(--faint);font-size:11px;border-bottom:2px solid transparent;}
  .step-tab.active{background:rgba(110,231,183,.13);color:var(--green);border-bottom:2px solid var(--green);}
  .modal-body{overflow-y:auto;padding:20px 28px;flex:1;}
  .modal-foot{padding:16px 28px;border-top:1px solid var(--border2);display:flex;justify-content:space-between;gap:10px;flex-shrink:0;}
  .modal-foot-right{display:flex;gap:8px;}

  .field{margin-bottom:14px;}
  .field-label{font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;}
  .field-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .field-grid-add{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end;}

  .color-row{display:flex;gap:6px;flex-wrap:wrap;}
  .color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .color-dot.selected{border-color:#fff;}

  .inline-box{background:var(--panel2);border-radius:12px;padding:16px;margin-bottom:16px;}
  .inline-box .hint{font-size:12px;color:var(--muted);margin-bottom:12px;}

  .remove-x{background:rgba(239,68,68,.13);color:#EF4444;border:none;border-radius:9px;padding:6px 10px;font-size:11px;}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1.5px solid var(--green);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:10px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:500;transition:opacity .3s, transform .3s;}
  .toast.hidden{opacity:0;transform:translateY(10px);pointer-events:none;}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* Profile tab */
  .profile-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;}
  @media (max-width:760px){.profile-grid{grid-template-columns:1fr;}}
  .profile-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
  .profile-card h3{font-family:'Fraunces',serif;font-size:15px;margin:0 0 14px 0;display:flex;align-items:center;justify-content:space-between;}
  .profile-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border2);font-size:12px;}
  .profile-row:last-child{border-bottom:none;}
  .profile-row .k{color:var(--muted);flex-shrink:0;}
  .profile-row .v{color:var(--text);text-align:right;word-break:break-word;}
  .bio-text{font-size:12.5px;color:var(--text);line-height:1.7;white-space:pre-wrap;}
  .tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
  .tag-chip{font-size:10px;padding:3px 10px;border-radius:12px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border2);}
  .toggle-row:last-child{border-bottom:none;}
  .toggle-label{font-size:12px;color:var(--text);}
  .toggle-sub{font-size:10px;color:var(--faint);margin-top:2px;}
  .switch{position:relative;width:38px;height:21px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:21px;transition:.2s;}
  .slider:before{content:"";position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
  .switch input:checked + .slider{background:var(--green);}
  .switch input:checked + .slider:before{transform:translateX(17px);}
  .profile-photo-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px;}
  .photo-big{width:84px;height:84px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#0d0f26;flex-shrink:0;}
  .link-btn{font-size:11px;color:var(--green);background:none;border:none;text-decoration:underline;padding:0;}
  textarea{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:12px;outline:none;font-family:'DM Mono',monospace;resize:vertical;min-height:70px;}
  .chip-input-row{display:flex;gap:6px;}
  .chip-input-row input{flex:1;}
  .chip-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .chip{display:flex;align-items:center;gap:6px;font-size:10px;padding:4px 6px 4px 10px;border-radius:12px;background:var(--panel2);border:1px solid var(--border);color:var(--text);}
  .chip button{background:none;border:none;color:#EF4444;font-size:11px;padding:0 2px;}

  /* Avatar picker */
  .avatar-mode-tabs{display:flex;gap:4px;background:var(--panel2);border-radius:9px;padding:3px;margin-bottom:14px;}
  .avatar-mode-tab{flex:1;padding:6px 4px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-size:10px;text-transform:capitalize;}
  .avatar-mode-tab.active{background:#6EE7B7;color:#0d0f26;font-weight:700;}
  .emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;max-height:150px;overflow-y:auto;padding:4px;}
  .emoji-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:8px;border:1.5px solid transparent;background:var(--panel2);cursor:pointer;}
  .emoji-cell.selected{border-color:#6EE7B7;background:rgba(110,231,183,.15);}
  .photo-upload-zone{border:1.5px dashed var(--border);border-radius:12px;padding:18px;text-align:center;cursor:pointer;}
  .photo-upload-zone:hover{border-color:#6EE7B7;}
  .photo-upload-zone input{display:none;}
  .avatar-actions{display:flex;gap:8px;justify-content:center;margin-top:10px;}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header>
    <div>
      <div class="logo">Faculty<span>Track</span></div>
      <div class="date-line" id="date-line"></div>
    </div>
    <div class="header-right" id="stats-row"></div>
  </header>

  <div class="body-wrap">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-top">
        <input id="search-input" placeholder="Search faculty…">
        <div class="filters" id="filter-row">
          <button class="filter-btn active" data-filter="all">all</button>
          <button class="filter-btn" data-filter="available">available</button>
          <button class="filter-btn" data-filter="in-meeting">in-meeting</button>
          <button class="filter-btn" data-filter="unavailable">unavailable</button>
        </div>
      </div>
      <div id="faculty-list"></div>
    </div>

    <!-- Main -->
    <div id="main">
      <div class="main-inner" id="main-inner"></div>
    </div>
  </div>
</div>

<!-- Add/Edit Faculty Modal -->
<div class="modal-overlay hidden" id="form-overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-row">
        <div class="modal-title" id="form-title">Add Faculty</div>
        <button class="modal-close" id="form-close">✕</button>
      </div>
      <div class="step-tabs" id="step-tabs">
        <button class="step-tab active" data-step="0"><span style="opacity:.7">1.</span> Basic Info</button>
        <button class="step-tab" data-step="1"><span style="opacity:.7">2.</span> Consultation Hours</button>
        <button class="step-tab" data-step="2"><span style="opacity:.7">3.</span> Meetings</button>
      </div>
    </div>
    <div class="modal-body" id="form-body"></div>
    <div class="modal-foot">
      <button class="btn outline" id="form-cancel">Cancel</button>
      <div class="modal-foot-right" id="form-foot-right"></div>
    </div>
  </div>
</div>

<!-- Book Meeting Modal -->
<div class="modal-overlay hidden" id="book-overlay">
  <div class="modal small" id="book-modal-box"></div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay hidden" id="confirm-overlay">
  <div class="modal confirm">
    <div style="font-size:32px;margin-bottom:10px;">🗑️</div>
    <div class="modal-title" style="margin-bottom:8px;">Remove Faculty?</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:22px;">This will delete all their consultation hours and meetings.</div>
    <div style="display:flex;gap:10px;">
      <button class="btn outline" style="flex:1" id="confirm-cancel">Cancel</button>
      <button class="btn danger" style="flex:1" id="confirm-delete">Delete</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
/* ══════════════ DATA & CONSTANTS ══════════════ */
const PALETTE = ["#6EE7B7","#FCA5A5","#93C5FD","#C4B5FD","#FDE68A","#F9A8D4","#A5B4FC","#6EE7F7","#FBD38D","#86EFAC"];
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const HOURS_LIST = Array.from({length:13},(_,i)=>`${String(i+7).padStart(2,"0")}:00`);
const TITLES = ["Professor","Associate Professor","Assistant Professor","Senior Lecturer","Lecturer","Visiting Professor","Adjunct Professor"];
const MEETING_TYPES = ["consultation","thesis","project","lab","research","exam","assignment","other"];
const TYPE_COLORS = {thesis:"#C4B5FD",project:"#93C5FD",consultation:"#6EE7B7",lab:"#FDE68A",research:"#FCA5A5",exam:"#F9A8D4",assignment:"#A5B4FC",other:"#86EFAC"};
const STATUS_META = {
  available:{label:"Available",bg:"#6EE7B7",dot:"#10B981"},
  "in-meeting":{label:"In Meeting",bg:"#FCA5A5",dot:"#EF4444"},
  unavailable:{label:"Unavailable",bg:"#9CA3AF",dot:"#6B7280"}
};

/* ══════════════ STATE ══════════════ */
let state = {
  facultyList: [],
  selectedId: null,
  tab: "overview",
  search: "",
  filter: "all",
  nextId: 1,
  formStep: 0,
  formData: null,      // working copy while add/edit modal open
  editingId: null,     // null = adding new
  deleteTargetId: null,
};

const EMOJI_OPTIONS = ["👨‍🏫","👩‍🏫","🧑‍🏫","👨‍🔬","👩‍🔬","🧑‍🔬","👨‍💻","👩‍💻","🧑‍💻","🎓","📚","🔬","🧪","💡","🖥️","📐","🧮","🌍","⚗️","🔭","🦉","🐼","🦊","🐶","🐱","🦁","🐧","🤓","😎","🙂"];

/* Renders avatar markup for any size given a faculty object.
   f.avatarMode: 'initials' | 'emoji' | 'photo'  (default 'initials') */
function avatarHTML(f, size){
  const mode = f.avatarMode || "initials";
  const radius = size>=56 ? "22px" : "50%";
  const baseStyle = `width:${size}px;height:${size}px;border-radius:${radius};border:2px solid ${f.color};flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;`;
  if(mode === "photo" && f.avatarPhoto){
    return `<div class="avatar" style="${baseStyle}background:${f.color}22;"><img src="${f.avatarPhoto}" style="width:100%;height:100%;object-fit:cover;" alt=""></div>`;
  }
  if(mode === "emoji" && f.avatarEmoji){
    const fontSize = Math.round(size*0.55);
    return `<div class="avatar" style="${baseStyle}background:linear-gradient(135deg,${f.color}cc,${f.color}44);font-size:${fontSize}px;">${f.avatarEmoji}</div>`;
  }
  const fontSize = Math.round(size*0.32);
  return `<div class="avatar" style="${baseStyle}background:linear-gradient(135deg,${f.color}cc,${f.color}44);font-size:${fontSize}px;font-weight:700;color:#0d0f26;">${esc(f.avatar||getInitials(f.name))}</div>`;
}

/* Renders the full avatar picker UI (mode tabs + content). prefix avoids id collisions
   when this picker appears in multiple places (modal vs profile tab). */
function avatarPickerHTML(f, prefix){
  const mode = f.avatarMode || "initials";
  return `
    <div class="avatar-mode-tabs" id="${prefix}-avatar-modes">
      <button class="avatar-mode-tab ${mode==='initials'?'active':''}" data-mode="initials">Initials</button>

function avatarPickerContentHTML(f, prefix){
  const mode = f.avatarMode || "initials";
  if(mode === "initials"){
    return `

    return `
      <div class="emoji-grid" id="${prefix}-emoji-grid">
        ${EMOJI_OPTIONS.map(e=>`<div class="emoji-cell ${f.avatarEmoji===e?'selected':''}" data-emoji="${e}">${e}</div>`).join("")}
      </div>
      <div class="field-label" style="margin:10px 0 6px;">Background Color</div>
      <div class="color-row" id="${prefix}-color-row">
        ${PALETTE.map(c=>`<div class="color-dot ${f.color===c?'selected':''}" data-color="${c}" style="background:${c}"></div>`).join("")}
      </div>
    `;
  }
  // photo
  return `
    <label class="photo-upload-zone" id="${prefix}-photo-zone">

      <div style="font-size:9px;color:var(--faint);margin-top:4px;">JPG or PNG, ideally square</div>
    </label>
    ${f.avatarPhoto ? `<div class="avatar-actions"><button class="btn small danger" id="${prefix}-photo-remove">Remove Photo</button></div>` : ""}
  `;
}

/* Wires up events for a rendered avatar picker. onChange is called after any update
   so the caller can re-render its own preview / form. */
function wireAvatarPicker(f, prefix, onChange){
  document.querySelectorAll(`#${prefix}-avatar-modes .avatar-mode-tab`).forEach(tab=>{
    tab.onclick = ()=>{
      f.avatarMode = tab.dataset.mode;
      onChange();
    };
  });
  const colorRow = document.getElementById(`${prefix}-color-row`);
  if(colorRow){
    colorRow.querySelectorAll(".color-dot").forEach(dot=>{
      dot.onclick = ()=>{ f.color = dot.dataset.color; onChange(); };
    });
  }
  const emojiGrid = document.getElementById(`${prefix}-emoji-grid`);
  if(emojiGrid){
    emojiGrid.querySelectorAll(".emoji-cell").forEach(cell=>{
      cell.onclick = ()=>{ f.avatarEmoji = cell.dataset.emoji; onChange(); };
    });
  }
  const photoInput = document.getElementById(`${prefix}-photo-input`);
  if(photoInput){
    photoInput.onchange = e=>{
      const file = e.target.files[0];
      if(!file) return;
      if(file.size > 2*1024*1024){ alert("Please choose an image under 2MB."); return; }
      const reader = new FileReader();
      reader.onload = ev=>{
        f.avatarPhoto = ev.target.result;
        f.avatarMode = "photo";
        onChange();
      };
      reader.readAsDataURL(file);
    };
  }
  const photoRemove = document.getElementById(`${prefix}-photo-remove`);
  if(photoRemove){
    photoRemove.onclick = ()=>{ f.avatarPhoto = null; onChange(); };
  }
}

function getInitials(name){
  return name.split(" ").filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("") || "??";
}
function formatTime(t){
  if(!t) return "";
  const [h,m] = t.split(":").map(Number);
  return `${h%12||12}:${String(m).padStart(2,"0")} ${h<12?"AM":"PM"}`;
}
function randomColor(id){ return PALETTE[id % PALETTE.length]; }
function esc(str){
  const d = document.createElement("div");
  d.textContent = str ?? "";
  return d.innerHTML;
}
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.remove("hidden");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.add("hidden"), 2200);
}

function renderWeeklyGrid(f){
  const todayIdx = new Date().getDay();
  const todayName = DAYS[todayIdx===0 ? 6 : todayIdx-1];

  let head = `<div class="grid-row"><div></div>` + DAYS.map(d=>
    `<div class="grid-head ${d===todayName?'today':''}" style="${d===todayName?`color:${f.color}`:""}">${d.slice(0,3).toUpperCase()}</div>`
  ).join("") + `</div>`;

  let rows = HOURS_LIST.map(hour=>{
    let cells = DAYS.map(day=>{
      const isConsult = f.consultationHours.some(c=>{
        if(c.day !== day) return false;
        const h=parseInt(hour), s=parseInt(c.start), e=parseInt(c.end);
        return h>=s && h<e;
      });
      const meeting = f.meetings.find(m=>{
        if(!m.date) return false;
        const mDay = new Date(m.date).toLocaleDateString("en-US",{weekday:"long"});
        return mDay===day && parseInt(m.start)===parseInt(hour);
      });
      let bg, border, inner="";
      if(meeting){
        const tc = TYPE_COLORS[meeting.type] || "#6EE7B7";
        bg = tc+"50"; border = `1px solid ${tc}`;
        inner = `<div class="mt-name">${esc(meeting.student.split(" ")[0])}</div>`;
      } else if(isConsult){
        bg = f.color+"22"; border = `1px solid ${f.color}50`;
        inner = `<div class="dot" style="background:${f.color}80"></div>`;
      } else {
        bg = "var(--panel2)"; border = "1px solid #22254a";
      }
      return `<div class="grid-cell" style="background:${bg};border:${border}">${inner}</div>`;
    }).join("");
    return `<div class="grid-row"><div class="grid-time">${formatTime(hour)}</div>${cells}</div>`;
  }).join("");

  let legend = `<div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:${f.color}22;border:1px solid ${f.color}50"></div>Consultation</div>
    ${MEETING_TYPES.map(t=>`<div class="legend-item"><div class="legend-swatch" style="background:${TYPE_COLORS[t]}50;border:1px solid ${TYPE_COLORS[t]}"></div>${t}</div>`).join("")}
  </div>`;

  return `<div class="grid-scroll"><div class="grid-inner">${head}${rows}${legend}</div></div>`;
}

/* ══════════════ ADD/EDIT FACULTY MODAL ══════════════ */
function openFacultyForm(faculty){
  state.editingId = faculty ? faculty.id : null;
  state.formStep = 0;
  if(faculty){
    state.formData = JSON.parse(JSON.stringify(faculty));
  } else {
    state.formData = {
      id: state.nextId, name:"", dept:"", title:TITLES[0], room:"", email:"",
      status:"available", consultationHours:[], meetings:[], color: randomColor(state.nextId),
      phone:"", officeHoursNote:"", bio:"", specializations:[], preferredContact:"email",
      notifyNewBooking:true, notifyReminder:true, autoDecline:false, showPhonePublic:false,
      avatarMode:"initials", avatarEmoji:null, avatarPhoto:null
    };
  }
  document.getElementById("form-title").textContent = faculty ? "Edit Faculty" : "Add Faculty";
  document.getElementById("form-overlay").classList.remove("hidden");
  renderFormSteps();
  renderFormBody();
}

function closeFacultyForm(){
  document.getElementById("form-overlay").classList.add("hidden");
  state.formData = null;
  state.editingId = null;
}

function renderFormSteps(){
  document.querySelectorAll("#step-tabs .step-tab").forEach(tab=>{
    const isActive = Number(tab.dataset.step) === state.formStep;
    tab.classList.toggle("active", isActive);
    tab.onclick = ()=>{ state.formStep = Number(tab.dataset.step); renderFormSteps(); renderFormBody(); };
  });
}

function renderFormBody(){
  const body = document.getElementById("form-body");
  const foot = document.getElementById("form-foot-right");
  const f = state.formData;

  if(state.formStep === 0){
    body.innerHTML = `
      <div style="margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">
          <div id="form-avatar-preview">${avatarHTML(f, 64)}</div>
          <div style="font-size:11px;color:var(--muted);">This is how ${f.name?esc(f.name):"the professor"} will appear across the dashboard.</div>
        </div>
        ${avatarPickerHTML(f, "f")}
      </div>
      <div class="field"><div class="field-label">Full Name *</div><input id="f-name" value="${esc(f.name)}" placeholder="e.g. Dr. Priya Ramanujan"></div>
      <div class="field"><div class="field-label">Department</div><input id="f-dept" value="${esc(f.dept)}" placeholder="e.g. Computer Science"></div>
      <div class="field"><div class="field-label">Title</div>
        <select id="f-title">${TITLES.map(t=>`<option value="${t}" ${f.title===t?'selected':''}>${t}</option>`).join("")}</select>
      </div>
      <div class="field-grid2">
        <div class="field"><div class="field-label">Room / Office</div><input id="f-room" value="${esc(f.room)}" placeholder="e.g. CS-204"></div>
        <div class="field"><div class="field-label">Status</div>
          <select id="f-status">
            <option value="available" ${f.status==='available'?'selected':''}>available</option>
            <option value="in-meeting" ${f.status==='in-meeting'?'selected':''}>in-meeting</option>
            <option value="unavailable" ${f.status==='unavailable'?'selected':''}>unavailable</option>
          </select>
        </div>
      </div>
      <div class="field"><div class="field-label">Email</div><input id="f-email" type="email" value="${esc(f.email)}" placeholder="faculty@university.edu"></div>
    `;
    document.getElementById("f-name").oninput = e=>{ f.name=e.target.value; document.getElementById("form-avatar-preview").innerHTML = avatarHTML(f,64); };
    document.getElementById("f-dept").oninput = e=> f.dept=e.target.value;
    document.getElementById("f-title").onchange = e=> f.title=e.target.value;
    document.getElementById("f-room").oninput = e=> f.room=e.target.value;
    document.getElementById("f-status").onchange = e=> f.status=e.target.value;
    document.getElementById("f-email").oninput = e=> f.email=e.target.value;
    wireAvatarPicker(f, "f", ()=>{ renderFormBody(); });

    foot.innerHTML = `<button class="btn" style="background:#6EE7B7" id="form-next">Next →</button>`;
    document.getElementById("form-next").onclick = ()=>{ state.formStep=1; renderFormSteps(); renderFormBody(); };
  }

  else if(state.formStep === 1){
    body.innerHTML = `
      <div class="inline-box">
        <div class="hint">Add a time slot:</div>
        <div class="field-grid-add">
          <div class="field" style="margin-bottom:0"><div class="field-label">Day</div>
            <select id="ch-day">${DAYS.map(d=>`<option value="${d}">${d}</option>`).join("")}</select>
          </div>
          <div class="field" style="margin-bottom:0"><div class="field-label">From</div><input id="ch-start" type="time" value="09:00"></div>
          <div class="field" style="margin-bottom:0"><div class="field-label">To</div><input id="ch-end" type="time" value="11:00"></div>
          <button class="btn small" style="background:#6EE7B7" id="ch-add">+ Add</button>
        </div>
      </div>
      <div id="ch-list">${f.consultationHours.length===0 ? `<div class="empty-mini">No slots added yet.</div>` : f.consultationHours.map((c,i)=>`
        <div class="ch-row" style="border:1px solid ${f.color}30">
          <div style="width:8px;height:8px;border-radius:50%;background:${f.color};flex-shrink:0;"></div>
          <div style="flex:1;font-size:12px;color:#e8e8f5;"><b>${esc(c.day)}</b> · ${formatTime(c.start)} – ${formatTime(c.end)}</div>
          <button class="remove-x" data-idx="${i}">✕</button>
        </div>`).join("")}
      </div>
    `;
    document.getElementById("ch-add").onclick = ()=>{
      const day = document.getElementById("ch-day").value;
      const start = document.getElementById("ch-start").value;
      const end = document.getElementById("ch-end").value;
      if(!day||!start||!end) return;
      f.consultationHours.push({day,start,end});
      renderFormBody();
    };
    document.querySelectorAll("#ch-list .remove-x").forEach(btn=>{
      btn.onclick = ()=>{ f.consultationHours.splice(Number(btn.dataset.idx),1); renderFormBody(); };
    });

    foot.innerHTML = `
      <button class="btn outline" id="form-back">← Back</button>
      <button class="btn" style="background:#6EE7B7" id="form-next">Next →</button>`;
    document.getElementById("form-back").onclick = ()=>{ state.formStep=0; renderFormSteps(); renderFormBody(); };
    document.getElementById("form-next").onclick = ()=>{ state.formStep=2; renderFormSteps(); renderFormBody(); };
  }

  else if(state.formStep === 2){
    body.innerHTML = `
      <div class="inline-box">
        <div class="hint">Schedule a meeting:</div>
        <div class="field"><div class="field-label">Student Name</div><input id="mt-student" placeholder="Student full name"></div>
        <div class="field-grid3">
          <div class="field" style="margin-bottom:0"><div class="field-label">Date</div><input id="mt-date" type="date"></div>
          <div class="field" style="margin-bottom:0"><div class="field-label">From</div><input id="mt-start" type="time" value="10:00"></div>
          <div class="field" style="margin-bottom:0"><div class="field-label">To</div><input id="mt-end" type="time" value="10:30"></div>
        </div>
        <div class="field" style="margin-top:10px"><div class="field-label">Type</div>
          <select id="mt-type">${MEETING_TYPES.map(t=>`<option value="${t}">${t}</option>`).join("")}</select>
        </div>
        <button class="btn" style="background:#6EE7B7;width:100%;margin-top:4px;" id="mt-add">+ Add Meeting</button>
      </div>
      <div id="mt-list">${f.meetings.length===0 ? `<div class="empty-mini">No meetings scheduled.</div>` : f.meetings.map(m=>{
        const tc = TYPE_COLORS[m.type] || "#2a2d4a";
        return `<div class="ch-row" style="align-items:center;border:1px solid ${tc}40">
          <div style="width:4px;height:36px;border-radius:4px;background:${TYPE_COLORS[m.type]||'#6EE7B7'};flex-shrink:0;"></div>
          <div style="flex:1">
            <div style="font-size:12px;color:#e8e8f5;font-weight:600;">${esc(m.student)}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px;">${esc(m.date||"")} · ${formatTime(m.start)}–${formatTime(m.end)} · <span style="color:${tc}">${esc(m.type)}</span></div>
          </div>
          <button class="remove-x" data-id="${m.id}">✕</button>
        </div>`;
      }).join("")}
      </div>
    `;
    document.getElementById("mt-add").onclick = ()=>{
      const student = document.getElementById("mt-student").value.trim();
      const date = document.getElementById("mt-date").value;
      const start = document.getElementById("mt-start").value;
      const end = document.getElementById("mt-end").value;
      const type = document.getElementById("mt-type").value;
      if(!student || !date) return;
      f.meetings.push({id:Date.now(), student, date, start, end, type, title:`${type} – ${student}`});
      renderFormBody();
    };
    document.querySelectorAll("#mt-list .remove-x").forEach(btn=>{
      btn.onclick = ()=>{ f.meetings = f.meetings.filter(m=>m.id!==Number(btn.dataset.id)); renderFormBody(); };
    });

    foot.innerHTML = `
      <button class="btn outline" id="form-back">← Back</button>
      <button class="btn" style="background:#6EE7B7" id="form-save">💾 Save Faculty</button>`;
    document.getElementById("form-back").onclick = ()=>{ state.formStep=1; renderFormSteps(); renderFormBody(); };
    document.getElementById("form-save").onclick = saveFacultyForm;
  }
}

function saveFacultyForm(){
  const f = state.formData;
  if(!f.name.trim()){ alert("Name is required."); state.formStep=0; renderFormSteps(); renderFormBody(); return; }
  f.avatar = getInitials(f.name);
  f.color = f.color || randomColor(f.id);

  const existingIdx = state.facultyList.findIndex(x=>x.id===f.id);
  if(existingIdx >= 0){
    state.facultyList[existingIdx] = f;
  } else {
    state.facultyList.push(f);
    state.nextId = Math.max(state.nextId, f.id+1) ;
    state.nextId = f.id + 1;
  }
  state.selectedId = f.id;
  closeFacultyForm();
  showToast(existingIdx>=0 ? "Faculty updated" : "Faculty added");
  renderAll();
}

/* ══════════════ BOOK MEETING MODAL ══════════════ */
function openBookModal(faculty){
  const overlay = document.getElementById("book-overlay");
  const box = document.getElementById("book-modal-box");
  box.innerHTML = `
    <div class="modal-title" style="margin-bottom:4px;">Book a Meeting</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:22px;">with ${esc(faculty.name)}</div>
    <div class="field"><div class="field-label">Your Name</div><input id="bk-student" placeholder="Enter your full name"></div>
    <div class="field"><div class="field-label">Date</div><input id="bk-date" type="date"></div>
    <div class="field-grid2">
      <div class="field"><div class="field-label">From</div><input id="bk-start" type="time" value="10:00"></div>
      <div class="field"><div class="field-label">To</div><input id="bk-end" type="time" value="10:30"></div>
    </div>
    <div class="field"><div class="field-label">Meeting Type</div>
      <select id="bk-type">${MEETING_TYPES.map(t=>`<option value="${t}">${t}</option>`).join("")}</select>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn outline" style="flex:1" id="bk-cancel">Cancel</button>
      <button class="btn" style="flex:2;background:${faculty.color}" id="bk-confirm">Confirm Booking</button>
    </div>
  `;
  overlay.classList.remove("hidden");
  document.getElementById("bk-cancel").onclick = ()=> overlay.classList.add("hidden");
  document.getElementById("bk-confirm").onclick = ()=>{
    const student = document.getElementById("bk-student").value.trim();
    const date = document.getElementById("bk-date").value;
    const start = document.getElementById("bk-start").value;
    const end = document.getElementById("bk-end").value;
    const type = document.getElementById("bk-type").value;
    if(!student || !date) return;
    const meeting = {id:Date.now(), student, date, start, end, type, title:`${type} – ${student}`};
    const f = state.facultyList.find(x=>x.id===faculty.id);
    f.meetings.push(meeting);
    box.innerHTML = `<div style="text-align:center;padding:20px 0;"><div style="font-size:36px;margin-bottom:10px;">✅</div><div class="modal-title" style="color:#6EE7B7;font-size:18px;">Meeting Booked!</div></div>`;
    setTimeout(()=>{ overlay.classList.add("hidden"); renderAll(); }, 1300);
  };
}

/* ══════════════ DELETE CONFIRM ══════════════ */
function openDeleteConfirm(id){
  state.deleteTargetId = id;
  document.getElementById("confirm-overlay").classList.remove("hidden");
}
document.getElementById("confirm-cancel").onclick = ()=>{
  document.getElementById("confirm-overlay").classList.add("hidden");
  state.deleteTargetId = null;
};
document.getElementById("confirm-delete").onclick = ()=>{
  state.facultyList = state.facultyList.filter(f=>f.id !== state.deleteTargetId);
  if(state.selectedId === state.deleteTargetId){
    state.selectedId = state.facultyList.length ? state.facultyList[0].id : null;
  }
  state.deleteTargetId = null;
  document.getElementById("confirm-overlay").classList.add("hidden");
  showToast("Faculty removed");
  renderAll();
};

/* ══════════════ GLOBAL EVENT WIRING ══════════════ */
document.getElementById("search-input").oninput = e=>{ state.search = e.target.value; renderSidebar(); };
document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    state.filter = btn.dataset.filter;
    renderSidebar();
  };
});
document.getElementById("form-close").onclick = closeFacultyForm;
document.getElementById("form-cancel").onclick = closeFacultyForm;

/* ══════════════ MASTER RENDER ══════════════ */
function renderAll(){
  renderHeader();
  renderSidebar();
  renderMain();
}

renderAll();
</script>
</body>
